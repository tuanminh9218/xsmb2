name: Deploy to GitHub Pages

on:

push:

branches: \["main", "master"\]

workflow_dispatch:

permissions:

contents: read

pages: write

id-token: write

concurrency:

group: "pages"

cancel-in-progress: false

jobs:

build:

runs-on: ubuntu-latest

steps:

  - name: Checkout

    uses: actions/checkout@v4



  - name: Setup Node

    uses: actions/setup-node@v4

    with:

      \# Cập nhật lên Node.js 24

      node-version: "24"

      \# Tự động cache giúp tốc độ install nhanh hơn ở các lần sau

      cache: 'npm'



  - name: Install dependencies

    \# Sử dụng npm ci (Clean Install) thay cho npm install

    \# để đảm bảo tính đồng nhất trên môi trường CI/CD

    run: npm ci



  - name: Build

    run: npm run build

    env:

      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      \# Bật tính năng cảnh báo sớm nếu có code không tương thích với ESM trong Node 24

      NODE_OPTIONS: "--trace-warnings"



  - name: Upload artifact

    uses: actions/upload-pages-artifact@v3

    with:

      \# Đảm bảo đường dẫn này khớp với folder output của anh (ví dụ: dist hoặc build)

      path: ./dist

deploy:

environment:

  name: github-pages

  url: ${{ steps.deployment.outputs.page_url }}

runs-on: ubuntu-latest

needs: build

steps:

  - name: Deploy to GitHub Pages

    id: deployment

    uses: actions/deploy-pages@v4

